name: Build Docs Site

on:
  push:
    branches:
      - main
    paths:
      - "docs/**/*.md"
      - "docs/build_site.py"
      - "docs/assets/site.css"
      - "docs/assets/**"
      - "slides/**/*.md"
      - "slides/**/*.py"
      - "slides/assets/**"
      - ".github/workflows/build-docs-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-publish
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build generated HTML
        run: |
          python docs/build_site.py --output site --source-base-url https://github.com/CambridgeCVCourses/IIA-Project-GF5/blob/main/docs
          python slides/build_slides.py --output site/parts12-slides.html
          python slides/build_slides.py --source slides/part3.md --output site/part3-slides.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload generated HTML artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy generated HTML to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
